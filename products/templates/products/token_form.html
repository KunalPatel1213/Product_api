<!DOCTYPE html>
<html>
<head>
    <title>JWT Token Login</title>
</head>
<body>
    <h2>JWT Token Login</h2>
    <form method="post" action="/api/token/form/">
        {% csrf_token %}
        <label>Username:</label>
        <input type="text" name="username" required><br><br>
        <label>Password:</label>
        <input type="password" name="password" required><br><br>
        <button type="submit">Get Token</button>
    </form>

    {% if token_data %}
        <h3>Token Data</h3>
        <pre>{{ token_data|safe }}</pre>
    {% endif %}
</body>
</html>
