<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Details List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #007bff; color: #fff; }
        tr:hover { background: #f1f1f1; }
        .link { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #007bff; color: #fff; text-decoration: none; border-radius: 5px; }
        .link:hover { background: #0056b3; }
        .no-data { color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard - All Details</h1>
        {% if details %}
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone No</th>
                        <th>Reg Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for detail in details %}
                    <tr>
                        <td>{{ detail.id }}</td>
                        <td>{{ detail.name }}</td>
                        <td>{{ detail.email }}</td>
                        <td>{{ detail.phoneno }}</td>
                        <td>{{ detail.reg_date }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        {% else %}
            <p class="no-data">No details found.</p>
        {% endif %}
        <a class="link" href="/api/dashboard/create-detail-page/">Create New Detail</a>
    </div>
</body>
</html>
